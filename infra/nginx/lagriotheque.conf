# Site statique — lagriotheque.com
server {
    listen 80;
    listen [::]:80;
    server_name lagriotheque.com www.lagriotheque.com;

    root /srv/lagriotheque;
    index index.html;

    # Tout fichier sinon fallback sur index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long sur les assets versionnés
    location ~* \.(jpg|jpeg|png|gif|webp|svg|woff2?|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Headers de sécurité de base
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
# NB : le bloc HTTPS (listen 443) sera ajouté automatiquement par Certbot.
