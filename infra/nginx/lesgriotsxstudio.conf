# Site statique — lesgriotsxstudio.com
#
# Sert directement les fichiers du monorepo cloné sur le VPS :
#   /var/www/ecosystem/production/lesgriots-platform/apps/lesgriotsxstudio/
#
# Pas de build, pas de bundler — c'est du React + Babel standalone (cf. index.html).
# Une mise à jour = git pull → la prochaine requête sert les nouveaux fichiers.

server {
    listen 80;
    listen [::]:80;
    server_name lesgriotsxstudio.com www.lesgriotsxstudio.com;

    root /var/www/ecosystem/production/lesgriots-platform/apps/lesgriotsxstudio;
    index index.html;

    # History API : les URLs /work/<id>, /talent, /about, /eco sont gérées
    # côté JS. nginx doit servir index.html pour tout chemin inconnu.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache court sur les fichiers JS/CSS (le cache-busting ?v= est dans
    # index.html, qui change à chaque déploiement → les browsers
    # re-téléchargent les .jsx/.css quand l'URL change).
    location ~* \.(css|jsx?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Cache long sur les médias (jpg, png, vidéos, fonts).
    # Les vidéos .web.mp4 sont uploadées via rsync (cf. deploy-videos.sh)
    # et changent rarement → cache 30 jours OK.
    location ~* \.(jpg|jpeg|png|gif|webp|svg|woff2?|mp4|webm|m4v)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Headers de sécurité de base
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
# NB : le bloc HTTPS (listen 443) sera ajouté automatiquement par Certbot.
