# Dashboard / admin — reverse proxy vers Next.js (port local 3000)
server {
    listen 80;
    listen [::]:80;
    server_name admin.lesgriotsxstudio.com;

    # Double protection : HTTP Basic auth EN PLUS du login interne de l'app
    auth_basic "Zone privée LES GRIOTS";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
# NB : le bloc HTTPS (listen 443) sera ajouté automatiquement par Certbot.
