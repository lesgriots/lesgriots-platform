# Admin centralisé — admin.lesgriots.com
#
# Hub admin pour TOUS les back-offices de l'écosystème LES GRIOTS.
# Chaque pilier a son propre sous-path qui reverse-proxy vers son port local.
#
#   admin.lesgriots.com/studio/      → BO Studio        (Next.js port 3030)
#   admin.lesgriots.com/griotheque/  → BO Griothèque    (Next.js port 3031) — à venir
#   admin.lesgriots.com/production/  → BO Production    (futur)
#   admin.lesgriots.com/os/          → LES GRIOTS OS    (futur)
#
# Pourquoi un sous-domaine unique :
#   1. 1 seul certif Let's Encrypt à renouveler
#   2. Cookies isolés des sites publics (sécurité)
#   3. Possibilité d'ajouter IP whitelist / VPN devant TOUT l'admin d'un coup
#   4. Hub unique = 1 bookmark à retenir pour Moos

server {
    listen 80;
    listen [::]:80;
    server_name admin.lesgriots.com;

    # Protection HTTP Basic auth en plus du login interne de chaque BO.
    # Le fichier .htpasswd est généré une fois sur le VPS avec :
    #   sudo htpasswd -c /etc/nginx/.htpasswd moos
    auth_basic "Zone privée LES GRIOTS";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Page d'accueil minimale = redirige vers le BO Studio tant qu'il est seul.
    # Plus tard, on pourra servir un index.html listant tous les piliers.
    location = / {
        return 302 /studio/;
    }

    # ═══ BO STUDIO ═══════════════════════════════════════════════════════
    # Next.js app servie sur localhost:3030.
    # /studio/ → l'app Next.js. Le basePath de l'app doit être configuré
    # à "/studio" dans next.config.js (sinon les assets _next/ partent en 404).
    location /studio/ {
        proxy_pass http://127.0.0.1:3030/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /studio;
        proxy_cache_bypass $http_upgrade;
    }

    # ═══ BO GRIOTHÈQUE ═══════════════════════════════════════════════════
    # Décommenter quand le BO Griothèque sera prêt à déployer.
    # location /griotheque/ {
    #     proxy_pass http://127.0.0.1:3031/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Forwarded-Prefix /griotheque;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # Headers de sécurité — admin = surface sensible.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
# NB : le bloc HTTPS (listen 443) sera ajouté automatiquement par Certbot.
